<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGR Report | Verified by Guard AI</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/vendor.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --primary-color: #39B54A;
            --dark-bg: #0b0b0b;
            --card-bg: rgba(30, 30, 30, 0.7);
        }
        body {
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #15301a 0%, #0b0b0b 100%);
        }
        .report-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: scaleUp 0.5s ease;
        }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .safe { background: rgba(57, 181, 74, 0.2); color: #39B54A; border: 1px solid #39B54A; }
        .danger { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border: 1px solid #ff3b30; }

        .score-val { font-size: 64px; font-weight: 900; margin-bottom: 5px; }
        .score-label { color: #888; text-transform: uppercase; font-size: 14px; letter-spacing: 2px; }
        
        .meta-grid {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .meta-item h4 { font-size: 18px; margin: 5px 0; color: #fff; }
        .meta-item p { font-size: 11px; color: #666; text-transform: uppercase; margin: 0; }
        
        .footer-note { margin-top: 40px; font-size: 12px; color: #555; font-style: italic; }
        .btn-home {
            margin-top: 30px;
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid var(--primary-color);
            padding: 10px 25px;
            border-radius: 30px;
            transition: 0.3s;
        }
        .btn-home:hover { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

    <div class="report-box">
        <div id="status-badge" class="badge">Authenticating Report...</div>
        <h1 id="app-name" style="margin: 0; font-size: 32px;">App Name</h1>
        <p id="report-id" style="color: #444; font-size: 13px; margin-top: 5px;">ID: SGR-000000</p>

        <div style="margin: 40px 0;">
            <div id="score" class="score-val">0%</div>
            <div class="score-label">Security Integrity Score</div>
        </div>

        <p id="verdict-summary" style="margin-top: 30px; color: #aaa; line-height: 1.6; font-size: 14px;">
            Analyzing security metrics...
        </p>

        <div class="footer-note">
            * This report was generated by Guard AI Scraper Engine using real-time security heuristics.
        </div>

        <a href="index.html" class="btn-home">Return to Guard.</a>
    </div>

    <script>
        // Parse URL Parameters
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "Unknown App";
        const score = params.get('score') || "0";
        const id = params.get('id') || "SGR-TOKEN-X";
        const safe = score >= 50;

        // UI Injection
        document.getElementById('app-name').innerText = name;
        document.getElementById('score').innerText = score + "%";
        document.getElementById('report-id').innerText = "ID: " + id;

        const badge = document.getElementById('status-badge');
        const summary = document.getElementById('verdict-summary');

        if(safe) {
            badge.className = "badge safe";
            badge.innerText = "Verified Authentic";
            summary.innerText = "Security check complete. This application matches all established trust patterns and official security signatures. No malicious behavior was detected during the deep crawl.";
        } else {
            badge.className = "badge danger";
            badge.innerText = "Security Warning";
            badge.style.borderColor = "#ff3b30";
            document.getElementById('score').style.color = "#ff3b30";
            summary.innerText = "CRITICAL: Security integrity check failed. Anomalous code patterns and potential threat signatures detected in the target application. Proceed with extreme caution.";
        }
    </script>
</body>
</html>
